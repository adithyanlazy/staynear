<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: House with location pin -->
  <g transform="translate(10, 10)">
    <!-- Location pin shape -->
    <path d="M40 5 C22 5 8 19 8 37 C8 60 40 85 40 85 C40 85 72 60 72 37 C72 19 58 5 40 5Z" fill="url(#iconGrad)" />
    <!-- House inside pin -->
    <path d="M40 22 L24 35 L24 52 L56 52 L56 35 Z" fill="white" opacity="0.95"/>
    <rect x="35" y="42" width="10" height="10" fill="url(#iconGrad)" rx="1"/>
    <!-- Window -->
    <rect x="29" y="38" width="7" height="6" fill="url(#iconGrad)" rx="1"/>
    <rect x="44" y="38" width="7" height="6" fill="url(#iconGrad)" rx="1"/>
  </g>
  
  <!-- Text: StayNear -->
  <text x="100" y="62" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="url(#logoGrad)" letter-spacing="-1">Stay</text>
  <text x="198" y="62" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#1f2937" letter-spacing="-1">Near</text>
</svg>