<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- House gradient: blue to purple -->
    <linearGradient id="houseGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <!-- Pin gradient: orange -->
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- House roof -->
  <path d="M80 255 L250 90 L420 255" 
        fill="none" 
        stroke="url(#houseGrad)" 
        stroke-width="35" 
        stroke-linejoin="round"
        stroke-linecap="round"/>

  <!-- House walls -->
  <path d="M115 240 L115 420 L420 420 L420 240" 
        fill="none" 
        stroke="url(#houseGrad)" 
        stroke-width="35" 
        stroke-linejoin="round"
        stroke-linecap="round"/>

  <!-- Window - 4 panes -->
  <rect x="205" y="265" width="90" height="80" rx="6"
        fill="none" 
        stroke="url(#houseGrad)" 
        stroke-width="22"/>
  <line x1="250" y1="265" x2="250" y2="345" 
        stroke="url(#houseGrad)" 
        stroke-width="22"/>
  <line x1="205" y1="305" x2="295" y2="305" 
        stroke="url(#houseGrad)" 
        stroke-width="22"/>

  <!-- Location pin -->
  <path d="M385 310 C355 280 330 250 330 220 C330 170 365 130 405 130 C445 130 480 170 480 220 C480 250 455 280 425 310 L405 355 L385 310 Z" 
        fill="url(#pinGrad)"/>
  <circle cx="405" cy="220" r="32" fill="#ffffff"/>
</svg>